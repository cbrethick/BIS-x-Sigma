<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIS Recommendation Engine</title>
    <meta name="description" content="AI-powered search for Bureau of Indian Standards">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <header>
            <div class="logo">
                <span class="logo-icon">✦</span>
                <h1>BIS RAG <span class="highlight">Engine</span></h1>
            </div>
            <p class="subtitle">AI-powered intelligent retrieval for Indian Standards.</p>
        </header>

        <section class="search-section">
            <div class="search-box">
                <input type="text" id="queryInput" placeholder="Describe the standards you are looking for... e.g. 'safety glass'" autocomplete="off" />
                <button id="searchBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
            <div class="loader" id="loader">
                <div class="spinner"></div>
                <span>Analyzing your request...</span>
            </div>
        </section>

        <section class="results-section" id="resultsSection" style="display: none;">
            <div class="results-header">
                <h2>Analysis Results</h2>
                <span class="latency" id="latencyBadge"></span>
            </div>
            
            <div class="standards-grid" id="standardsGrid">
                <!-- Standards will be injected here -->
            </div>

            <div class="rationale-container" id="rationaleContainer">
                <!-- AI rationale will be injected here -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
